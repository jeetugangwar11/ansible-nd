    # =========================================================================
    # QUERY – Various filter combinations
    # =========================================================================

    - name: Query all resources (no filters)
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
      register: result_query_all

    - name: Print query all result
      ansible.builtin.debug:
        var: result_query_all.response

    - name: Verify query all returned a list
      ansible.builtin.assert:
        that:
          - result_query_all is not failed
          - result_query_all.response is defined
        fail_msg: "Query all resources failed"

    - name: Query resources – filter by entity name
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
        config:
          - entity_name: "l3_vni_fabric"
          - entity_name: "mmudigon-2"
          - entity_name: "{{ serial_1 }}~{{ serial_2 }}"
          - entity_name: "{{ serial_1 }}~Ethernet1/10"
          - entity_name: "{{ serial_1 }}~Ethernet1/3~{{ serial_2 }}~Ethernet1/3"
      register: result_query_by_entity

    - name: Print query by entity name result
      ansible.builtin.debug:
        var: result_query_by_entity.response

    - name: Verify query by entity name
      ansible.builtin.assert:
        that:
          - result_query_by_entity is not failed
        fail_msg: "Query by entity name failed"

    - name: Query resources – filter by switch
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
        config:
          - switch:
              - "{{ switch_1 }}"
      register: result_query_by_switch

    - name: Print query by switch result
      ansible.builtin.debug:
        var: result_query_by_switch.response

    - name: Verify query by switch
      ansible.builtin.assert:
        that:
          - result_query_by_switch is not failed
        fail_msg: "Query by switch failed"

    - name: Query resources – filter by pool name
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
        config:
          - pool_name: "L3_VNI"
          - pool_name: "VPC_ID"
          - pool_name: "SUBNET"
      register: result_query_by_pool

    - name: Print query by pool name result
      ansible.builtin.debug:
        var: result_query_by_pool.response

    - name: Verify query by pool name
      ansible.builtin.assert:
        that:
          - result_query_by_pool is not failed
        fail_msg: "Query by pool name failed"

    - name: Query resources – filter by switch and pool name
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
        config:
          - pool_name: "L3_VNI"
            switch:
              - "{{ switch_1 }}"
          - pool_name: "VPC_ID"
            switch:
              - "{{ switch_2 }}"
      register: result_query_switch_pool

    - name: Print query by switch and pool name result
      ansible.builtin.debug:
        var: result_query_switch_pool.response

    - name: Verify query by switch and pool name
      ansible.builtin.assert:
        that:
          - result_query_switch_pool is not failed
        fail_msg: "Query by switch and pool name failed"

    - name: Query resources – mixed filters
      cisco.nd.nd_manage_resource_manager:
        state: query
        fabric: "{{ fabric }}"
        config:
          - entity_name: "l3_vni_fabric"
          - switch:
              - "{{ switch_1 }}"
          - pool_name: "VPC_ID"
            switch:
              - "{{ switch_1 }}"
      register: result_query_mixed

    - name: Print mixed query result
      ansible.builtin.debug:
        var: result_query_mixed.response

    - name: Verify mixed query
      ansible.builtin.assert:
        that:
          - result_query_mixed is not failed
        fail_msg: "Mixed query failed"

